<!-- CONTENT.HTML -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content - CreatorVault</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #EC4899;
            --secondary: #F9A8D4;
            --accent: #BE185D;
            --bg: #FFF8FC;
            --card: #FFFFFF;
            --text: #111827;
            --text-light: #6B7280;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(236, 72, 153, 0.2);
            --shadow: 0 8px 32px rgba(236, 72, 153, 0.15);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background */
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 20s ease-in-out infinite;
        }

        .bg-blob:nth-child(1) {
            width: 600px;
            height: 600px;
            background: var(--secondary);
            top: -200px;
            right: -200px;
        }

        .bg-blob:nth-child(2) {
            width: 400px;
            height: 400px;
            background: var(--primary);
            bottom: -100px;
            left: -100px;
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.05); }
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow);
            padding: 1rem 2rem;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
        }

        .logo span {
            color: var(--accent);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--primary);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(236, 72, 153, 0.5);
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
        }

        .mobile-menu-btn span {
            display: block;
            width: 25px;
            height: 3px;
            background: var(--text);
            margin: 5px 0;
            border-radius: 3px;
        }

        /* Mobile Menu */
        .mobile-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 80%;
            max-width: 320px;
            height: 100vh;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            z-index: 2000;
            padding: 2rem;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .mobile-menu.active {
            right: 0;
        }

        .mobile-menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .mobile-menu-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .mobile-menu-links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .mobile-menu-links a {
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
            padding: 0.75rem;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .mobile-menu-links a:hover {
            background: var(--primary);
            color: white;
        }

        .mobile-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1500;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .mobile-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Main Content */
        .main-content {
            padding: 8rem 2rem 4rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .page-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 1rem;
        }

        .page-subtitle {
            color: var(--text-light);
            font-size: 1.1rem;
        }

        /* Tabs */
        .tabs-container {
            margin-bottom: 3rem;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 1rem 2rem;
            border: 2px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .tab-btn:hover {
            border-color: var(--primary);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border-color: transparent;
        }

        .tab-btn svg {
            width: 20px;
            height: 20px;
        }

        /* Content Grid */
        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        /* Cards */
        .content-card {
            background: var(--card);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            position: relative;
        }

        .content-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(236, 72, 153, 0.2);
        }

        .card-image-wrapper {
            position: relative;
            overflow: hidden;
        }

        .card-image {
            width: 100%;
            height: 280px;
            object-fit: cover;
            transition: all 0.3s ease;
        }

        .content-card.blurred .card-image {
            filter: blur(15px);
        }

        .card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .content-card.blurred .card-overlay {
            opacity: 1;
        }

        .lock-icon {
            width: 60px;
            height: 60px;
            background: var(--glass-bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .lock-icon svg {
            width: 28px;
            height: 28px;
            stroke: var(--primary);
        }

        .upgrade-btn {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .upgrade-btn:hover {
            transform: scale(1.05);
        }

        .premium-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .video-badge {
            position: absolute;
            bottom: 1rem;
            left: 1rem;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .video-badge svg {
            width: 14px;
            height: 14px;
            fill: white;
        }

        .card-content {
            padding: 1.25rem;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 0.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-light);
            font-size: 0.85rem;
        }

        /* Video Modal */
        .video-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 3000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .video-modal.active {
            display: flex;
        }

        .video-modal-content {
            max-width: 900px;
            width: 100%;
            position: relative;
        }

        .video-modal-close {
            position: absolute;
            top: -40px;
            right: 0;
            background: none;
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
        }

        .video-modal video {
            width: 100%;
            border-radius: 12px;
        }

        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 300px;
            grid-column: 1/-1;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--secondary);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .mobile-menu-btn {
                display: block;
            }

            .page-title {
                font-size: 2rem;
            }

            .content-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }

            .card-image {
                height: 200px;
            }

            .tabs {
                gap: 0.5rem;
            }

            .tab-btn {
                padding: 0.75rem 1.25rem;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            .main-content {
                padding: 7rem 1rem 3rem;
            }

            .content-grid {
                grid-template-columns: 1fr;
            }

            .card-image {
                height: 280px;
            }
        }
    </style>
</head>
<body>
    <!-- Background -->
    <div class="bg-pattern">
        <div class="bg-blob"></div>
        <div class="bg-blob"></div>
    </div>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Creator<span>Vault</span></a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="content.html" class="active">Content</a>
                <a href="account.html" class="btn btn-primary" id="authBtn">Login</a>
            </div>
            <button class="mobile-menu-btn" id="mobileMenuBtn">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- Mobile Menu -->
    <div class="mobile-overlay" id="mobileOverlay"></div>
    <div class="mobile-menu" id="mobileMenu">
        <div class="mobile-menu-header">
            <span class="logo">Creator<span>Vault</span></span>
            <button class="mobile-menu-close" id="mobileMenuClose">&times;</button>
        </div>
        <div class="mobile-menu-links">
            <a href="index.html">Home</a>
            <a href="content.html">Content</a>
            <a href="account.html">Account</a>
        </div>
    </div>

    <!-- Main Content -->
    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">Browse Content</h1>
            <p class="page-subtitle">Explore exclusive photos and videos</p>
        </div>

        <!-- Tabs -->
        <div class="tabs-container">
            <div class="tabs">
                <button class="tab-btn active" data-tab="photos">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <circle cx="8.5" cy="8.5" r="1.5"></circle>
                        <polyline points="21 15 16 10 5 21"></polyline>
                    </svg>
                    Photos
                </button>
                <button class="tab-btn" data-tab="videos">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="23 7 16 12 23 17 23 7"></polygon>
                        <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
                    </svg>
                    Videos
                </button>
            </div>
        </div>

        <!-- Photos Section -->
        <div class="content-section active" id="photos-section">
            <div class="content-grid" id="photos-grid">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>

        <!-- Videos Section -->
        <div class="content-section" id="videos-section">
            <div class="content-grid" id="videos-grid">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Video Modal -->
    <div class="video-modal" id="videoModal">
        <div class="video-modal-content">
            <button class="video-modal-close" id="closeModal">&times;</button>
            <video id="modalVideo" controls></video>
        </div>
    </div>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://your-project.supabase.co';
        const SUPABASE_ANON_KEY = 'your-anon-key';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Check session
        const session = JSON.parse(localStorage.getItem('creatorvault_session') || 'null');
        let isPremium = false;

        if (session) {
            isPremium = session.membership === 'premium' || session.membership === 'vip';
        }

        // DOM Elements
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const mobileMenu = document.getElementById('mobileMenu');
        const mobileOverlay = document.getElementById('mobileOverlay');
        const mobileMenuClose = document.getElementById('mobileMenuClose');
        const authBtn = document.getElementById('authBtn');
        const tabBtns = document.querySelectorAll('.tab-btn');
        const photosSection = document.getElementById('photos-section');
        const videosSection = document.getElementById('videos-section');
        const videoModal = document.getElementById('videoModal');
        const closeModal = document.getElementById('closeModal');
        const modalVideo = document.getElementById('modalVideo');

        // Update auth button
        if (session) {
            authBtn.textContent = session.user_name.split(' ')[0];
        }

        // Mobile Menu
        mobileMenuBtn.addEventListener('click', () => {
            mobileMenu.classList.add('active');
            mobileOverlay.classList.add('active');
        });

        function closeMobileMenu() {
            mobileMenu.classList.remove('active');
            mobileOverlay.classList.remove('active');
        }

        mobileMenuClose.addEventListener('click', closeMobileMenu);
        mobileOverlay.addEventListener('click', closeMobileMenu);

        // Tabs
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                const tab = btn.dataset.tab;
                if (tab === 'photos') {
                    photosSection.classList.add('active');
                    videosSection.classList.remove('active');
                } else {
                    videosSection.classList.add('active');
                    photosSection.classList.remove('active');
                }
            });
        });

        // Load Photos
        async function loadPhotos() {
            const grid = document.getElementById('photos-grid');
            
            try {
                const { data, error } = await supabase
                    .from('photos')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!data || data.length === 0) {
                    grid.innerHTML = '<p style="text-align: center; color: var(--text-light); grid-column: 1/-1;">No photos available yet.</p>';
                    return;
                }

                grid.innerHTML = data.map(photo => {
                    const isLocked = photo.premium && !isPremium;
                    
                    return `
                        <div class="content-card ${isLocked ? 'blurred' : ''}">
                            <div class="card-image-wrapper">
                                <img src="${photo.url}" alt="${photo.title}" class="card-image">
                                ${photo.premium ? '<span class="premium-badge">Premium</span>' : ''}
                                <div class="card-overlay">
                                    <div class="lock-icon">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                                        </svg>
                                    </div>
                                    <p style="color: white; margin-bottom: 1rem; font-weight: 500;">Premium Content</p>
                                    <a href="account.html" class="upgrade-btn">Upgrade Now</a>
                                </div>
                            </div>
                            <div class="card-content">
                                <h3 class="card-title">${photo.title}</h3>
                                <div class="card-meta">
                                    <span>Photo</span>
                                    ${photo.category ? `<span>• ${photo.category}</span>` : ''}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (error) {
                console.error('Error loading photos:', error);
                grid.innerHTML = '<p style="text-align: center; color: var(--text-light); grid-column: 1/-1;">Error loading photos.</p>';
            }
        }

        // Load Videos
        async function loadVideos() {
            const grid = document.getElementById('videos-grid');
            
            try {
                const { data, error } = await supabase
                    .from('videos')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!data || data.length === 0) {
                    grid.innerHTML = '<p style="text-align: center; color: var(--text-light); grid-column: 1/-1;">No videos available yet.</p>';
                    return;
                }

                grid.innerHTML = data.map(video => {
                    const isLocked = video.premium && !isPremium;
                    
                    return `
                        <div class="content-card ${isLocked ? 'blurred' : ''}" data-video-url="${video.video_url}">
                            <div class="card-image-wrapper">
                                <img src="${video.thumbnail_url}" alt="${video.title}" class="card-image">
                                ${video.premium ? '<span class="premium-badge">Premium</span>' : ''}
                                <span class="video-badge">
                                    <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                                    ${video.duration || '0:00'}
                                </span>
                                <div class="card-overlay">
                                    <div class="lock-icon">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                                        </svg>
                                    </div>
                                    <p style="color: white; margin-bottom: 1rem; font-weight: 500;">Premium Content</p>
                                    <a href="account.html" class="upgrade-btn">Upgrade Now</a>
                                </div>
                            </div>
                            <div class="card-content">
                                <h3 class="card-title">${video.title}</h3>
                                <div class="card-meta">
                                    <span>Video</span>
                                    ${video.category ? `<span>• ${video.category}</span>` : ''}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                // Add click listeners for video cards
                document.querySelectorAll('.content-card[data-video-url]').forEach(card => {
                    card.addEventListener('click', (e) => {
                        if (!card.classList.contains('blurred')) {
                            const videoUrl = card.dataset.videoUrl;
                            modalVideo.src = videoUrl;
                            videoModal.classList.add('active');
                            modalVideo.play();
                        }
                    });
                });

            } catch (error) {
                console.error('Error loading videos:', error);
                grid.innerHTML = '<p style="text-align: center; color: var(--text-light); grid-column: 1/-1;">Error loading videos.</p>';
            }
        }

        // Close modal
        closeModal.addEventListener('click', () => {
            videoModal.classList.remove('active');
            modalVideo.pause();
            modalVideo.src = '';
        });

        videoModal.addEventListener('click', (e) => {
            if (e.target === videoModal) {
                videoModal.classList.remove('active');
                modalVideo.pause();
                modalVideo.src = '';
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadPhotos();
            loadVideos();
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</body>
</html>
